spring:
  config:
    import: optional:file:.env
  application:
    name: fairplay

  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 20MB      # 단일 파일 최대 크기
      max-request-size: 100MB  # 전체 요청 최대 크기 (다중 파일 업로드 고려)

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fairplay}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:8}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:2}
      idle-timeout: 300000           # 유휴 타임아웃 5분 (10분 -> 5분)
      max-lifetime: 1800000          # 최대 수명 30분 유지
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT_MS:5000}
      leak-detection-threshold: ${DB_HIKARI_LEAK_DETECTION_MS:10000}
      validation-timeout: 5000       # 커넥션 검증 타임아웃 (5초)
      keepalive-time: 300000         # Keepalive 체크 (5분)
      register-mbeans: true          # JMX MBean 등록 (모니터링용)

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  hashids:
    salt: ${HASHIDS_SALT}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

# 웹소켓 설정 (배포환경 최적화)
websocket:
  heartbeat:
    client: 25000 # 클라이언트 heartbeat (25초)
    server: 25000 # 서버 heartbeat (25초)
  disconnect-delay: 30000 # 연결 끊김 지연 시간
  message-size-limit: 65536 # 메시지 크기 제한 (64KB)

# 서버 설정
server:
  tomcat:
    connection-timeout: 60s
    keep-alive-timeout: 60s

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: 1800000 # 30분(1,800,000 ms)
  refresh-token-validity-ms: 7200000 # 2시간(7,200,000 ms)
  refresh-token-prefix: "refresh_token:"

# Google Gemini API
gemini:
  api-key: ${GEMINI_API_KEY:}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}
  client-secret: ${KAKAO_CLIENT_SECRET:}

cloud:
  aws:
    s3:
      enabled: ${AWS_S3_ENABLED:false}
      bucket-name: ${AWS_S3_BUCKET_NAME} # S3 버킷 이름
      endpoint: ${AWS_S3_ENDPOINT:}
      path-style-access: ${AWS_S3_PATH_STYLE_ACCESS:false}
    region:
      static: ap-northeast-2 # ← 한국(서울) 리전으로 고정
      auto: false
    stack:
      auto: false # CloudFormation 스택 자동 생성 비활성화
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    cloudfront:
      domain: ${AWS_CLOUDFRONT_DOMAIN}

# 애플리케이션 기본 URL
app:
  environment: ${APP_ENVIRONMENT:dev}  # dev, prod (로컬 개발: dev, 배포: prod)
  base-url: ${APP_BASE_URL:https://fair-play.ink}
  postgres:
    auto-init-constraints: ${APP_POSTGRES_AUTO_INIT_CONSTRAINTS:true}
  upload:
    path: ${UPLOAD_PATH:/app/uploads}  # Docker 컨테이너 내부 업로드 경로
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@fair-play.ink}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}

# 아임포트 설정
iamport:
  api-key: ${IAMPORT_API_KEY}
  secret-key: ${IAMPORT_SECRET_KEY}
  base-url: ${IAMPORT_BASE_URL:https://api.iamport.kr}
llm:
  provider: ${LLM_PROVIDER:HERMES}
  bot-user-id: 999    # AI 챗봇의 사용자 ID
  gemini:
    api-key: ${GEMINI_API_KEY:}       # 환경변수 권장
    model: gemini-2.5-flash           # 기본값(경량/저지연)
  openai:
#    api-key: ${OPENAI_API_KEY:}       # 나중에 전환용
#    model: gpt-4o-mini
  hermes:
    base-url: ${HERMES_GATEWAY_BASE_URL:http://host.docker.internal:8788}
    api-key: ${HERMES_GATEWAY_API_KEY:}
    model: ${HERMES_GATEWAY_MODEL:gpt-5.4-mini}
    wait-timeout-seconds: ${HERMES_GATEWAY_WAIT_TIMEOUT_SECONDS:60}
    connect-timeout-seconds: ${HERMES_GATEWAY_CONNECT_TIMEOUT_SECONDS:5}
    request-timeout-seconds: ${HERMES_GATEWAY_REQUEST_TIMEOUT_SECONDS:75}

banner:
  lock:
    default-minutes: 2880 # ←신청 슬롯 기본 락 유지시간 (분)  // BannerApplicationService @Value
    cleanup:
      delay: 300000 #  만료락 해제 주기(밀리초)


# 로깅 설정
logging:
  level:
    com.fairing.fairplay.ai.client.GoogleGeminiClient: ${LOG_LEVEL_GEMINI_CLIENT:INFO}
    com.fairing.fairplay.ai.rag.service: ${LOG_LEVEL_RAG_SERVICE:INFO}
    com.zaxxer.hikari: ${LOG_LEVEL_HIKARI:INFO}
    com.zaxxer.hikari.pool.HikariPool: ${LOG_LEVEL_HIKARI_POOL:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BIND:OFF}
    org.springframework.transaction: ${LOG_LEVEL_TRANSACTION:INFO}

# QR 티켓 조회 주소
qr:
  url: ${QR_TICKET_REACT_URL}

rag:
  embedding:
    fallback-enabled: ${RAG_EMBEDDING_FALLBACK_ENABLED:false}
  pgvector:
    auto-init: ${RAG_PGVECTOR_AUTO_INIT:true}



management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,hikaricp
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: fairplay       # 앱 이름 태그
      instance: ${HOSTNAME:local} # 인스턴스 태그
    enable:
      hikaricp: true  # HikariCP 메트릭 활성화
      jdbc: true      # JDBC 메트릭 활성화
