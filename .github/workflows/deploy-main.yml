name: deploy-on-main

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      fe_ref:
        description: Frontend ref to build into the backend image
        required: false
        default: main

env:
  BACKEND_DIR: .                           # BE 프로젝트 루트 경로
  IMAGE_REPOSITORY: songchih/fairplay-backend
  IMAGE_NAME: songchih/fairplay-backend:${{ github.sha }}
  IMAGE_LATEST: songchih/fairplay-backend:latest
  FE_REF: ${{ inputs.fe_ref || 'main' }}

concurrency:
  group: fairplay-prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout BE (this repo)
        uses: actions/checkout@v4

      # ---------- Frontend 가져오기 & 빌드 ----------
      - name: Checkout FE (FairPlay_FE)
        uses: actions/checkout@v4
        with:
          repository: rktclgh/FairPlay_FE
          ref: ${{ env.FE_REF }}
          path: fe-src
          token: ${{ secrets.CI_GITHUB_TOKEN }}  # PAT(repo read) 필요

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fe-src/package-lock.json

      - name: Install FE deps
        working-directory: fe-src
        run: |
          npm ci || npm install

      - name: Create FE .env from Secrets
        working-directory: fe-src
        run: |
          set -euo pipefail
          rm -f .env
          {
            echo "VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}"
            echo "VITE_FRONTEND_BASE_URL=${{ secrets.VITE_FRONTEND_BASE_URL }}"
            echo "VITE_CDN_BASE_URL=${{ secrets.VITE_CDN_BASE_URL }}"
            echo "VITE_ENABLE_NEW_PICKS=${{ secrets.VITE_ENABLE_NEW_PICKS || 'false' }}"
            echo "VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}"
            echo "VITE_KAKAO_MAP_ID=${{ secrets.VITE_KAKAO_MAP_ID }}"
            echo "VITE_BUSINESS_SERVICE_KEY=${{ secrets.VITE_BUSINESS_SERVICE_KEY }}"
          } >> .env
          for key in VITE_BACKEND_BASE_URL VITE_FRONTEND_BASE_URL VITE_CDN_BASE_URL; do
            value="$(grep -E "^${key}=" .env | cut -d= -f2-)"
            if [ -z "${value}" ]; then
              echo "Missing required frontend secret: ${key}"
              exit 1
            fi
          done

      - name: Build FE
        working-directory: fe-src
        timeout-minutes: 10
        run: npm run build

      - name: Inject FE dist into BE static
        run: |
          rm -rf "${{ env.BACKEND_DIR }}/src/main/resources/static"
          mkdir -p "${{ env.BACKEND_DIR }}/src/main/resources/static"
          cp -r fe-src/dist/* "${{ env.BACKEND_DIR }}/src/main/resources/static/"

      # ---------- Backend jar build ----------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute for gradlew
        working-directory: ${{ env.BACKEND_DIR }}
        run: chmod +x gradlew

      - name: Build Spring Boot jar
        working-directory: ${{ env.BACKEND_DIR }}
        run: ./gradlew clean test bootJar --no-daemon

      # ---------- Docker build & push ----------
      - name: Verify DockerHub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "Missing DOCKERHUB_USERNAME"; exit 1; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "Missing DOCKERHUB_TOKEN"; exit 1; fi

      - name: Docker login (docker.io)
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}
            ${{ env.IMAGE_LATEST }}

  deploy-miniserver:
    needs: build-and-push
    runs-on: [self-hosted, linux, x64, fairplay, miniserver]
    env:
      MINI_SERVER_DEPLOY_PATH: ${{ secrets.MINI_SERVER_DEPLOY_PATH || '/home/song/Desktop/fairplay-deploy' }}
      FAIRPLAY_BACKEND_IMAGE: songchih/fairplay-backend:${{ github.sha }}
    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Stage compose and nginx config
        run: |
          mkdir -p "${MINI_SERVER_DEPLOY_PATH}"
          cp deploy/docker-compose.miniserver.yml deploy/nginx.miniserver.conf "${MINI_SERVER_DEPLOY_PATH}/"

      - name: Deploy on mini server
        run: |
          set -euo pipefail
          DEPLOY_PATH="${MINI_SERVER_DEPLOY_PATH}"
          cd "${DEPLOY_PATH}"
          
          # .env 정규화 및 자격 추출
          test -f .env || { echo "Missing ${DEPLOY_PATH}/.env. Use deploy/.env.miniserver.example as the template."; exit 1; }
          sed -i 's/\r$//' .env
          grep -Ev '^(DOCKERHUB_USERNAME|DOCKERHUB_TOKEN)=' .env > app.env
          sed -i 's#host\.docker\.internal#127.0.0.1#g' app.env
          DU=$(grep -E '^DOCKERHUB_USERNAME=' .env | sed -E 's/^DOCKERHUB_USERNAME=//; s/^"//; s/"$//; s/[[:space:]]+$//')
          DT=$(grep -E '^DOCKERHUB_TOKEN=' .env     | sed -E 's/^DOCKERHUB_TOKEN=//;     s/^"//; s/"$//; s/[[:space:]]+$//')
          [ -n "$DU" ] && [ -n "$DT" ] || { echo "DOCKERHUB creds missing in .env"; exit 1; }
          [ -n "${FAIRPLAY_BACKEND_IMAGE}" ] || { echo "FAIRPLAY_BACKEND_IMAGE missing"; exit 1; }
          export FAIRPLAY_BACKEND_IMAGE
          
          echo "$DT" | docker login -u "$DU" --password-stdin
          
          # compose 명령 탐지
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "Docker Compose not installed. Install v2 plugin or docker-compose."
            exit 1
          fi

          # 기존 컨테이너 중지 및 삭제
          echo "Stopping and removing existing containers..."
          $DC -f docker-compose.miniserver.yml down || true
          docker rm -f fairplay-backend fairplay-nginx 2>/dev/null || true

          # 최신 이미지 pull 및 컨테이너 시작
          $DC -f docker-compose.miniserver.yml pull
          $DC -f docker-compose.miniserver.yml up -d

          # 사용하지 않는 이미지 정리
          docker image prune -f

      - name: Smoke check deployed service
        run: |
          set -euo pipefail
          BASE_URL="http://127.0.0.1:18083"
          for i in $(seq 1 30); do
            if curl -fsS "${BASE_URL}/actuator/health" >/tmp/fairplay-health.json; then
              cat /tmp/fairplay-health.json
              break
            fi
            if [ "$i" = "30" ]; then
              docker logs --tail=120 fairplay-backend || true
              exit 1
            fi
            sleep 2
          done

          curl -fsSI "${BASE_URL}/" | grep -Ei 'HTTP/|content-type'
          HTML="$(curl -fsS "${BASE_URL}/")"
          printf '%s' "${HTML}" | grep -E '<html|<div id="root"' >/dev/null
          ASSET_PATH="$(printf '%s' "${HTML}" | grep -m1 -oE '/assets/[^"]+\.(js|css)')"
          test -n "${ASSET_PATH}" || { echo "No built frontend asset found in index.html"; exit 1; }
          curl -fsS \
            -H "Origin: https://fairplay.rktclgh.site" \
            -H "Referer: https://fairplay.rktclgh.site/" \
            "${BASE_URL}${ASSET_PATH}" >/dev/null
          curl -fsS "${BASE_URL}/api/events" >/tmp/fairplay-events.json

          SSE_STATUS="$(curl -sS -o /tmp/fairplay-sse.out -w '%{http_code}' --max-time 5 "${BASE_URL}/api/notifications/stream" || true)"
          case "${SSE_STATUS}" in
            200|401|403) ;;
            *) echo "Unexpected SSE status: ${SSE_STATUS}"; cat /tmp/fairplay-sse.out || true; exit 1 ;;
          esac

          WS_STATUS="$(curl -sS -o /tmp/fairplay-ws-info.out -w '%{http_code}' --max-time 5 "${BASE_URL}/ws/chat-sockjs/info" || true)"
          case "${WS_STATUS}" in
            200|401|403) ;;
            *) echo "Unexpected SockJS status: ${WS_STATUS}"; cat /tmp/fairplay-ws-info.out || true; exit 1 ;;
          esac

          UPLOAD_STATUS="$(curl -sS -o /tmp/fairplay-upload.out -w '%{http_code}' --max-time 5 "${BASE_URL}/uploads/__fairplay_smoke__" || true)"
          case "${UPLOAD_STATUS}" in
            200|301|302|403|404) ;;
            *) echo "Unexpected uploads status: ${UPLOAD_STATUS}"; cat /tmp/fairplay-upload.out || true; exit 1 ;;
          esac

          RUNNING_IMAGE="$(docker inspect -f '{{.Config.Image}}' fairplay-backend)"
          test "${RUNNING_IMAGE}" = "${FAIRPLAY_BACKEND_IMAGE}" || {
            echo "Running image mismatch: ${RUNNING_IMAGE} != ${FAIRPLAY_BACKEND_IMAGE}"
            exit 1
          }
