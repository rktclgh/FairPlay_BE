services:
  fairplay-backend:
    image: ${FAIRPLAY_BACKEND_IMAGE:-songchih/fairplay-backend:latest}
    container_name: fairplay-backend
    network_mode: host
    env_file:
      - app.env
    environment:
      TZ: Asia/Seoul
      SERVER_PORT: 18082
      JAVA_TOOL_OPTIONS: >-
        -Xms128m
        -Xmx512m
        -XX:MaxMetaspaceSize=256m
        -XX:MaxDirectMemorySize=128m
        -XX:+UseG1GC
        -XX:+UseStringDeduplication
        -XX:+UseContainerSupport
        -Djava.awt.headless=true
        -Duser.timezone=Asia/Seoul
    volumes:
      - fairplay-static-files:/app/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  fairplay-nginx:
    image: nginx:1.27-alpine
    container_name: fairplay-nginx
    network_mode: host
    depends_on:
      - fairplay-backend
    volumes:
      - ./nginx.miniserver.conf:/etc/nginx/conf.d/default.conf:ro
      - fairplay-static-files:/var/www/uploads:ro
    restart: unless-stopped

volumes:
  fairplay-static-files:
    driver: local
