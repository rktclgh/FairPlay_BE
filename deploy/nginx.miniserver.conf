server {
    listen 127.0.0.1:18083;
    server_name fairplay.rktclgh.site localhost 127.0.0.1;

    client_max_body_size 100M;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location = /uploads/private {
        return 404;
    }

    location ^~ /uploads/private/ {
        return 404;
    }

    location = /uploads/temp {
        return 404;
    }

    location ^~ /uploads/temp/ {
        return 404;
    }

    location = /uploads/tmp {
        return 404;
    }

    location ^~ /uploads/tmp/ {
        return 404;
    }

    location ~ "^/uploads/tmp[0-9]{4}-[0-9]{2}-[0-9]{2}(/|$)" {
        return 404;
    }

    location = /uploads/uploads/temp {
        return 404;
    }

    location ^~ /uploads/uploads/temp/ {
        return 404;
    }

    location = /uploads/uploads/tmp {
        return 404;
    }

    location ^~ /uploads/uploads/tmp/ {
        return 404;
    }

    location ~ "^/uploads/uploads/tmp[0-9]{4}-[0-9]{2}-[0-9]{2}(/|$)" {
        return 404;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    location /sse/ {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }
}
